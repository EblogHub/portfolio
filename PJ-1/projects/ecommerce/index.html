<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopHub - Premium Online Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="overlay" id="overlay"></div>
    <header>
        <div class="header-top">
            <div class="brand">🛍️ ShopHub</div>
            <div class="live-indicator">
                <div class="live-dot"></div>
                <span>LIVE</span>
            </div>
        </div>
        <nav>
            <a href="../../index.html">Back to Portfolio</a>
            <button id="cart"
                style="background: linear-gradient(45deg, #ee7752, #e73c7e); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 20px; cursor: pointer; font-weight: 600;">🛒
                Cart: 0</button>
        </nav>
    </header>
    <main>
        <div class="activity-feed" id="activity-feed">
            <div class="activity-item">⭐ New customer from New York just joined!</div>
        </div>
        <section id="products">
            <h2 style="color: white; text-align: center;">Featured Products</h2>
            <div id="product-list"></div>
        </section>

        <section id="cart-section"
            style="display: none; background: rgba(255,255,255,0.95); border-radius: 15px; padding: 2rem;">
            <h2 style="color: #333;">Your Shopping Cart</h2>
            <div id="cart-items"></div>
            <button id="checkout"
                style="background: linear-gradient(45deg, #22c55e, #16a34a); color: white; padding: 1rem 2rem; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; margin-top: 1rem; width: 100%;">Proceed
                to Checkout 💳</button>
            <button id="close-cart"
                style="background: #6c757d; color: white; padding: 0.75rem 1rem; border-radius: 10px; border: none; cursor: pointer; margin-top: 0.5rem; width: 100%;">Continue
                Shopping</button>
        </section>
    </main>
    <section id="contact" style="background: #333; color: white; padding: 2rem; border-radius: 15px; margin-top: 2rem;">
        <h2>Contact Us</h2>
        <form id="contact-form" style="display: flex; flex-direction: column; gap: 1rem;">
            <input type="text" id="name" placeholder="Your Name" required
                style="padding: 0.75rem; border-radius: 10px; border: none;">
            <input type="email" id="email" placeholder="Your Email" required
                style="padding: 0.75rem; border-radius: 10px; border: none;">
            <textarea id="message" placeholder="Your Message" required
                style="padding: 0.75rem; border-radius: 10px; border: none;"></textarea>
        </form>
    </section>


    <footer>
        <p>&copy; 2023 ShopHub. All rights reserved. designed & built by EblogHub</p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
