<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevForum - Developer Community</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div>
                <h1>DevForum</h1>
                <p>Connect with developers, share knowledge, and build modern solutions together.</p>
            </div>
            <nav>
                <a href="../../index.html">Back to Portfolio</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="threads-panel">
            <div class="panel-heading">
                <span class="live-badge">Live</span>
                <h2>Trending discussions</h2>
            </div>
            <div id="threads"></div>
        </section>
        <aside class="activity-panel">
            <div class="panel-heading">
                <h2>Community pulse</h2>
            </div>
            <div class="activity-summary">
                <p>Active members are sharing insights, code snippets, and event recaps in real time.</p>
            </div>
            <ul id="activityList"></ul>
        </aside>
    </main>
    <script src="script.js"></script>
</body>
</html>
