<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnHub - Expand Your Knowledge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="brand">
            <h1>LearnHub</h1>
            <span class="status live">Live Classes</span>
        </div>
        <nav>
            <a href="../../index.html">Back to Portfolio</a>
            <a href="#courses">Courses</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-copy">
            <h2>Learn with experts and grow your career faster.</h2>
            <p>Interactive courses, live sessions, and a growing community of students.</p>
            <div class="hero-stats">
                <div class="stat">
                    <span id="active-learners">3,218 learners active</span>
                    <small>Active learners</small>
                </div>
                <div class="stat">
                    <span id="live-classes">4 live classes</span>
                    <small>Live sessions</small>
                </div>
            </div>
        </div>
    </section>

    <section id="courses">
        <h2>Featured Courses</h2>
        <div id="course-list"></div>
    </section>

    <section class="activity-panel">
        <h3>Recent Activity</h3>
        <ul id="recent-activity"></ul>
    </section>

    <script src="script.js"></script>
</body>
</html>
